name: SSH Connection Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ssh-test:
    name: Test VPS SSH Access
    runs-on: ubuntu-latest
    steps:
      - name: Debug TCP reachability on port 22
        env:
          SSH_HOST: ${{ secrets.HOST }}
        run: |
          set -eux
          echo "Testing raw TCP connectivity to ${SSH_HOST}:22"
          nc -vz -w 5 "$SSH_HOST" 22

      - name: Debug SSH handshake/banner
        env:
          SSH_HOST: ${{ secrets.HOST }}
        run: |
          set -eux
          echo "Trying to read SSH banner from ${SSH_HOST}:22"
          ssh-keyscan -T 10 -p 22 "$SSH_HOST"

      - name: Test SSH login with password
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          timeout: 30s
          command_timeout: 2m
          script_stop: true
          script: |
            echo "SSH login successful"
            whoami
            hostname
            pwd
