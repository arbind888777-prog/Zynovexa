name: Deploy App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-app:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script: |
            set -eux
            APP_DIR="${{ secrets.APP_DIR }}"

            cd "$APP_DIR"
            git fetch origin
            git checkout main
            git pull origin main
            bash deploy.sh
