name: Deploy App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-app:
    name: Deploy Frontend And Backend To VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script: |
            set -eux
            cd /var/www/Zynovexa
            git fetch --all
            git reset --hard origin/main
            
            # API Setup
            cd apps/api
            npm install
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            /usr/local/bin/pm2 restart zynovexa-api || /usr/local/bin/pm2 start dist/main.js --name zynovexa-api

            # Web Setup
            cd ../web
            npm install
            npm run build
            /usr/local/bin/pm2 restart zynovexa-web || /usr/local/bin/pm2 start .next/standalone/server.js --name zynovexa-web
