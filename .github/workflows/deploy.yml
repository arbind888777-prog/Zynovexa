name: Deploy App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-app:
    name: Deploy Frontend And Backend To VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script: |
            set -eux
            cd /var/www/Zynovexa
            git fetch --all
            git reset --hard origin/main
            npm install

            cd apps/api
            test -f .env
            grep -q '^DATABASE_URL=' .env
            grep -q '^DIRECT_URL=' .env
            grep -Eq '^DATABASE_URL=.*schema=zynovexa' .env || { echo 'DATABASE_URL must include schema=zynovexa'; exit 1; }
            grep -Eq '^DIRECT_URL=.*schema=zynovexa' .env || { echo 'DIRECT_URL must include schema=zynovexa'; exit 1; }
            npm install
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            pm2 restart zynovexa-api || pm2 start dist/main.js --name zynovexa-api

            cd ../web
            npm install
            npm run build
            pm2 restart zynovexa-web || pm2 start .next/standalone/server.js --name zynovexa-web
