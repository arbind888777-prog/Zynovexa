name: Deploy App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-app:
    name: Deploy Docker Stack To VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script: |
            set -eux
            APP_DIR="${{ secrets.APP_DIR }}"
            DOMAIN="${{ secrets.DOMAIN }}"
            SSL_EMAIL="${{ secrets.SSL_EMAIL }}"
            ENABLE_WWW="${{ secrets.ENABLE_WWW }}"

            cd "$APP_DIR"
            git fetch origin
            git checkout main
            git pull origin main

            if [ "$ENABLE_WWW" = "true" ]; then
              ./deploy.sh --domain="$DOMAIN" --email="$SSL_EMAIL" --enable-www
            else
              ./deploy.sh --domain="$DOMAIN" --email="$SSL_EMAIL"
            fi
