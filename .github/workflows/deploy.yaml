name: Deploy App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-app:
    name: Deploy Frontend And Backend To VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          timeout: 120s
          command_timeout: 30m
          script: |
            set -e

            echo "=== Starting Zynovexa Deployment ==="

            # Check if directory exists
            if [ ! -d "/var/www/Zynovexa" ]; then
              echo "ERROR: /var/www/Zynovexa directory not found on VPS!"
              exit 1
            fi

            cd /var/www/Zynovexa

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Running deploy script ==="
            chmod +x deploy.sh
            ./deploy.sh --branch=main

            echo "=== Deployment complete ==="
