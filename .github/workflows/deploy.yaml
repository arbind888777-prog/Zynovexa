name: Deploy App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-app:
    name: Deploy Frontend And Backend To VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: 22
          timeout: 120s
          command_timeout: 30m
          script: |
            set -e

            echo "=== Starting Zynovexa Deployment ==="
            DEPLOY_PATH="/root/Zynovexa"

            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "ERROR: $DEPLOY_PATH folder not found!"
              exit 1
            fi

            cd $DEPLOY_PATH

            echo "=== Syncing Code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Fixing Database & Dependencies ==="
            cd apps/api
            touch .env
            
            npm install
            
            # Jo migrations conflict kar rahi hain unhe force-resolve kar rahe hain
            npx prisma migrate resolve --applied 20260303083532_init || echo "Migration 1 skip"
            npx prisma migrate resolve --applied 20260306034710_add_brand_deals_media_jobs_video_seo || echo "Migration 2 skip"
            npx prisma migrate resolve --applied 20260309090000_add_commerce || echo "Migration 3 skip"
            
            npx prisma generate

            echo "=== Building & Restarting Services ==="
            cd $DEPLOY_PATH
            chmod +x deploy.sh
            
            # Running the main deployment script
            ./deploy.sh --branch=main

            echo "=== Deployment Successfully Completed ==="
