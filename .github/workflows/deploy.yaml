name: Deploy App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-app:
    name: Deploy Frontend And Backend To VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: 22
          timeout: 120s
          command_timeout: 30m
          script: |
            set -e

            echo "=== Starting Zynovexa Deployment ==="

            # Folder path ko sahi kiya gaya hai (root folder)
            DEPLOY_PATH="/root/Zynovexa"

            # Check if directory exists
            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "ERROR: $DEPLOY_PATH directory not found on VPS!"
              exit 1
            fi

            cd $DEPLOY_PATH

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            # Env files validation fix
            echo "=== Checking Env Files ==="
            touch apps/web/.env
            touch apps/api/.env

          echo "=== Fixing Database Migration ==="
            cd apps/api
            npx prisma migrate resolve --applied 20260303083532_init || echo "Migration already applied"
            
            echo "=== Running deploy script ==="
            cd /root/Zynovexa
            chmod +x deploy.sh
            ./deploy.sh --branch=main
