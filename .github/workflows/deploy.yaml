name: Deploy App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-app:
    name: Deploy Frontend And Backend To VPS
    runs-on: ubuntu-latest
    env:
      RAW_DEPLOY_HOST: ${{ secrets.HOST }}
      RAW_DEPLOY_HOST_ALT_1: ${{ secrets.SSH_HOST }}
      RAW_DEPLOY_HOST_ALT_2: ${{ secrets.VPS_HOST }}
      RAW_DEPLOY_USERNAME: ${{ secrets.USERNAME }}
      RAW_DEPLOY_USERNAME_ALT_1: ${{ secrets.SSH_USERNAME }}
      RAW_DEPLOY_USERNAME_ALT_2: ${{ secrets.VPS_USERNAME }}
      RAW_DEPLOY_KEY: ${{ secrets.KEY }}
      RAW_DEPLOY_KEY_ALT_1: ${{ secrets.SSH_PRIVATE_KEY }}
      RAW_DEPLOY_KEY_ALT_2: ${{ secrets.VPS_SSH_KEY }}
      RAW_DEPLOY_PASSWORD: ${{ secrets.PASSWORD }}
      RAW_DEPLOY_PASSWORD_ALT_1: ${{ secrets.SSH_PASSWORD }}
      RAW_DEPLOY_PASSWORD_ALT_2: ${{ secrets.VPS_PASSWORD }}
      RAW_DEPLOY_PATH: ${{ secrets.APP_DIR }}
      RAW_DEPLOY_PATH_ALT_1: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Resolve deploy secrets
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          deploy_host="${RAW_DEPLOY_HOST:-${RAW_DEPLOY_HOST_ALT_1:-${RAW_DEPLOY_HOST_ALT_2:-}}}"
          deploy_username="${RAW_DEPLOY_USERNAME:-${RAW_DEPLOY_USERNAME_ALT_1:-${RAW_DEPLOY_USERNAME_ALT_2:-}}}"
          deploy_key="${RAW_DEPLOY_KEY:-${RAW_DEPLOY_KEY_ALT_1:-${RAW_DEPLOY_KEY_ALT_2:-}}}"
          deploy_password="${RAW_DEPLOY_PASSWORD:-${RAW_DEPLOY_PASSWORD_ALT_1:-${RAW_DEPLOY_PASSWORD_ALT_2:-}}}"
          deploy_path="${RAW_DEPLOY_PATH:-${RAW_DEPLOY_PATH_ALT_1:-/var/www/zynovexa}}"

          if [ -z "$deploy_host" ]; then
            echo "::error::Missing SSH host secret. Set one of: HOST, SSH_HOST, VPS_HOST"
            exit 1
          fi

          if [ -z "$deploy_username" ]; then
            echo "::error::Missing SSH username secret. Set one of: USERNAME, SSH_USERNAME, VPS_USERNAME"
            exit 1
          fi

          if [ -z "$deploy_key" ] && [ -z "$deploy_password" ]; then
            echo "::error::Missing SSH auth secret. Set KEY or PASSWORD, or use SSH_PRIVATE_KEY / SSH_PASSWORD / VPS_SSH_KEY / VPS_PASSWORD"
            exit 1
          fi

          {
            echo "deploy_host=$deploy_host"
            echo "deploy_username=$deploy_username"
            echo "deploy_password=$deploy_password"
            echo "deploy_path=$deploy_path"
            echo "deploy_key<<EOF"
            printf '%s\n' "$deploy_key"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ steps.resolve.outputs.deploy_host }}
          username: ${{ steps.resolve.outputs.deploy_username }}
          key: ${{ steps.resolve.outputs.deploy_key }}
          password: ${{ steps.resolve.outputs.deploy_password }}
          port: 22
          timeout: 120s
          command_timeout: 30m
          script: |
            set -e

            echo "=== Starting Zynovexa Deployment ==="
            DEPLOY_PATH="${{ steps.resolve.outputs.deploy_path }}"
            DEPLOY_USER="${{ steps.resolve.outputs.deploy_username }}"

            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "Configured deploy path not found: $DEPLOY_PATH"
              for candidate in \
                "/var/www/zynovexa" \
                "/root/Zynovexa" \
                "/home/$DEPLOY_USER/Zynovexa" \
                "/home/$DEPLOY_USER/zynovexa" \
                "/opt/zynovexa"; do
                if [ -d "$candidate" ]; then
                  DEPLOY_PATH="$candidate"
                  echo "Auto-detected existing app directory: $DEPLOY_PATH"
                  break
                fi
              done
            fi

            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "ERROR: Deployment folder not found. Set GitHub secret APP_DIR or DEPLOY_PATH to the correct VPS repo path."
              exit 1
            fi

            cd "$DEPLOY_PATH"
            chmod +x deploy.sh

            echo "=== Deploying from $DEPLOY_PATH ==="
            APP_DIR="$DEPLOY_PATH" ./deploy.sh --branch=main

            echo "=== Deployment Successfully Completed ==="
