name: Deploy App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-app:
    name: Deploy Frontend And Backend To VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: 22
          timeout: 120s
          command_timeout: 30m
          script: |
            set -e

            echo "=== Starting Zynovexa Deployment ==="
            DEPLOY_PATH="/root/Zynovexa"

            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "ERROR: $DEPLOY_PATH folder not found!"
              exit 1
            fi

            cd $DEPLOY_PATH

            echo "=== Syncing Code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Fixing Database & Dependencies ==="
            # Yarn error se bachne ke liye npm ka use
            cd apps/api
            touch .env
            npm install
            npx prisma migrate resolve --applied 20260303083532_init || echo "Migration already handled"
            npx prisma generate

            echo "=== Building & Restarting Services ==="
            cd $DEPLOY_PATH
            chmod +x deploy.sh
            # Script ko bina yarn ke chalane ki koshish
            ./deploy.sh --branch=main || (npm install && ./deploy.sh --branch=main)

            echo "=== Deployment Successfully Completed ==="
