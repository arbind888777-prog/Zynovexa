version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: zynovexa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zynovexa
      POSTGRES_USER: zynovexa
      POSTGRES_PASSWORD: zynovexa_pass_2026
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zynovexa']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zynovexa-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── pgAdmin (DB GUI) ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: zynovexa-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@zynovexa.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres
    profiles:
      - dev

  # ─── API (NestJS) ─────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: zynovexa-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql://zynovexa:zynovexa_pass_2026@postgres:5432/zynovexa
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads

  # ─── Web (Next.js) ────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    container_name: zynovexa-web
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  api_uploads:
