version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Zynovexa — DEV Docker Compose
#
# Usage (development):
#   docker-compose up -d redis          ← start only Redis
#   cd apps/api && npm run start:dev    ← NestJS with hot-reload
#   cd apps/web && npm run dev          ← Next.js with hot-reload
#
# NOTE: api/web containers are intentionally NOT here for dev.
# Docker containers kill hot-reload. Run them directly with npm run dev.
#
# For production → use docker-compose.prod.yml
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── Redis (Queue & Cache) ─────────────────────────────────────────────────
  # The ONLY service needed locally — DB is Supabase cloud, no local Postgres.
  redis:
    image: redis:7-alpine
    container_name: zynovexa-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Optional: Local Postgres (profile-gated, NOT needed when using Supabase)
  # Start with: docker-compose --profile local-db up -d
  localdb:
    image: postgres:15-alpine
    container_name: zynovexa-localdb
    restart: unless-stopped
    profiles:
      - local-db
    environment:
      POSTGRES_DB: zynovexa
      POSTGRES_USER: zynovexa
      POSTGRES_PASSWORD: zynovexa_pass_2026
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zynovexa']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  postgres_data:
